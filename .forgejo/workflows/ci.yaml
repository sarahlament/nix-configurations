name: CI
on:
  push:
    branches: [main]
  pull_request:

# the fleet is derived from directory.nix via the flake, so adding a host never
# touches this file. act_runner can't build a strategy.matrix from a job output,
# so each job loops over the flake-evaluated host list instead of a matrix. each
# host gets its own ::group:: in the log, and a failure is recorded (rc) but
# doesn't abort the remaining hosts.

jobs:
  check:
    runs-on: native
    if: >-
      github.event_name == 'pull_request'
      && !contains(github.event.pull_request.title || '', '[ci-skip]')
    steps:
      - uses: actions/checkout@v4
      - name: "check"
        run: nix flake check

  build:
    runs-on: native
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - name: "build"
        # every nixosConfiguration, incl. the builder (brigid)
        run: |
          rc=0
          for host in $(nix eval --raw .#nixosConfigurations --apply 'cfgs: builtins.concatStringsSep " " (builtins.attrNames cfgs)'); do
            echo "::group::build $host"
            nixos-rebuild build --flake .#"$host" --no-link || rc=1
            echo "::endgroup::"
          done
          exit $rc

  dry-activate:
    runs-on: native
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: "dry-activate"
        # the deploy-rs node set - the whole fleet (brigid loops back to itself)
        run: |
          rc=0
          for host in $(nix eval --raw .#deploy.nodes --apply 'ns: builtins.concatStringsSep " " (builtins.attrNames ns)'); do
            echo "::group::dry-activate $host"
            nixos-rebuild dry-activate --flake .#"$host" --target-host nixbldRemote@"$host".lament.gay --sudo || rc=1
            echo "::endgroup::"
          done
          exit $rc

  deploy:
    runs-on: native
    if: >-
      github.event_name == 'push'
      && !contains(github.event.head_commit.message || '', '[ci-skip]')
    steps:
      - uses: actions/checkout@v4
      - name: "deploy reachable hosts"
        # deploy each reachable host in its own invocation: a header per host, and
        # one failure doesn't touch the others (each keeps its own magic rollback).
        # offline hosts (e.g. ishtar the desktop) are skipped, not failed.
        run: |
          rc=0
          for host in $(nix eval --raw .#deploy.nodes --apply 'ns: builtins.concatStringsSep " " (builtins.attrNames ns)'); do
            if ssh -o BatchMode=yes -o ConnectTimeout=8 -o StrictHostKeyChecking=accept-new \
                 nixbldRemote@"$host".lament.gay true 2>/dev/null; then
              echo "::group::deploy $host"
              deploy --skip-checks ".#$host" || rc=1
              echo "::endgroup::"
            else
              echo "::warning::$host unreachable over WG - skipping deploy"
            fi
          done
          exit $rc
