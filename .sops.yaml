keys:
  # personal admin key - stays for editing secrets locally
  - &lament age15k8clh8j26kxmnrfaa4a83s7mm7d5xl7vueh04kkrtpc2shhcuzqewurla
  # per-host keys - each host decrypts only what it needs
  - &athena  age1jhhre25nx0pq6j5gegsep0yyxua499y3az729p95rgq3qta0ppwqzlsqfp
  - &ishtar  age18w5jg06hg3q0tj5za0cnhe3wm2m7a3ds6ne5gwt5p2ct9y90vdaq0wcyum
  - &minerva age15z2akyxwh32jmlg5myzghzu7lgvsnascqra8z9swdjps8yl0gq9shgp6r7
  - &brigid  age1qe5728xwrzt9dq4yxy0vhpe76as9m7jweda7m4979azau7zrzg4syc43p4

creation_rules:
  # per-host privkeys: each host gets only its own SSH key, WG key, and the keys it needs
  # athena: SSH + WG + builderKey (offloads builds to brigid)
  - path_regex: ^sops/privkeys/athena\.yaml$
    key_groups:
    - age: [*lament, *athena]

  # ishtar: SSH + WG + builderKey + lamentKey (desktop - personal SSH key lives here)
  - path_regex: ^sops/privkeys/ishtar\.yaml$
    key_groups:
    - age: [*lament, *ishtar]

  # minerva: SSH + WG + builderKey
  - path_regex: ^sops/privkeys/minerva\.yaml$
    key_groups:
    - age: [*lament, *minerva]

  # brigid: SSH + WG + deployerKey (builder host; runs the CI that deploys the fleet)
  - path_regex: ^sops/privkeys/brigid\.yaml$
    key_groups:
    - age: [*lament, *brigid]

  # borg per-subuser: SSH key + repo passphrase + exported repo key (Enc, DR-only)
  - path_regex: ^sops/borg/sub1\.yaml$
    key_groups:
    - age: [*lament, *athena]

  - path_regex: ^sops/borg/sub2\.yaml$
    key_groups:
    - age: [*lament, *ishtar]

  - path_regex: ^sops/borg/sub3\.yaml$
    key_groups:
    - age: [*lament, *minerva]

  # sub4: provisioned and ready, not yet assigned to a host - lament-only until then
  - path_regex: ^sops/borg/sub4\.yaml$
    key_groups:
    - age: [*lament]

  # athena only: knot (dns.authority) + tsig
  - path_regex: ^sops/domain\.yaml$
    key_groups:
    - age: [*lament, *athena]

  # athena only: mailserver (edge.mail)
  - path_regex: ^sops/mail\.yaml$
    key_groups:
    - age: [*lament, *athena]

  # all hosts: lamentUserPass is declared in users/lament.nix (fleet-wide)
  - path_regex: ^sops/pass\.yaml$
    key_groups:
    - age: [*lament, *athena, *ishtar, *minerva, *brigid]

  # ishtar, minerva, brigid: lanzaboote; athena uses the Linode kernel, no SB
  - path_regex: ^sops/pki\.yaml$
    key_groups:
    - age: [*lament, *ishtar, *minerva, *brigid]

  # minerva: grafanaSecretKey, vaultwardenToken; brigid: forgejoRunnerToken
  - path_regex: ^sops/services\.yaml$
    key_groups:
    - age: [*lament, *minerva, *brigid]
