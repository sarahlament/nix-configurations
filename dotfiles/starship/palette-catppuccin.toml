# Catppuccin Mocha - the server fallback for `palette = "noctalia"`. mirrors the
# name set noctalia's starship template emits, so the shared body renders the
# same on a headless box (fixed) as on ishtar (matugen-injected). appended to the
# body by nix on servers only; on ishtar noctalia injects its own block instead.
[palettes.noctalia]
blue      = "#89b4fa"
red       = "#f38ba8"
green     = "#a6e3a1"
yellow    = "#f9e2af"
cyan      = "#94e2d5"
magenta   = "#cba6f7"
white     = "#bac2de"
black     = "#45475a"

rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
maroon    = "#eba0ac"
peach     = "#fab387"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
lavender  = "#b4befe"

text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"
