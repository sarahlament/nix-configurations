# kitty visual config - repo-managed but MUTABLE via HM mkOutOfStoreSymlink.
# ~/.config/kitty/rice.conf is a symlink to this file, and the HM-generated
# kitty.conf `include`s it (ishtar only). edit live, reload kitty (ctrl+shift+f5)
# - no rebuild. jj tracks it, borg backs it up.
# the package / terminfo / zsh-integration stay typed in homeModules/apps/kitty.nix.

font_family      JetBrains Mono Nerd Font
font_size        13

background_opacity         0.85
dynamic_background_opacity yes

# niri tiles the window, so no initial size / remember-size needed. kill kitty's
# decorations too - niri's focus-ring is the only frame we want.
hide_window_decorations yes
window_padding_width    5

enable_audio_bell no
# audio's off, so flash the screen instead. deliberately NOT palette-derived:
# the matugen theme is all cool dark blues, so a flash sampled from it is too
# low-contrast to notice. hardcode a warm saturated alert color + a longer linger
# so it actually breaks your peripheral vision. bell_border_color left default -
# hide_window_decorations + niri tiling never shows kitty's own border anyway.
visual_bell_duration 0.4 ease-out
visual_bell_color    #ff8a00

cursor_blink_interval     0.5
cursor_stop_blinking_after 5
cursor_trail              5
cursor_trail_decay        0.2 0.6

scrollback_lines             5000
scrollbar                    scrolled-and-hovered
scrollback_indicator_opacity 0.75

mouse_hide_wait        5
show_hyperlink_targets yes
underline_hyperlinks   always

# input
# selection goes straight to the system clipboard
copy_on_select      clipboard

# behavior
# nix owns the package, kill the built-in update nag
update_check_interval 0

# noctalia's matugen palette (regenerated from the wallpaper; left as noctalia
# writes it - don't hand-edit, it gets overwritten).
include /home/lament/.config/kitty/themes/noctalia.conf
